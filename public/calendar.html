<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>ปฏิทินงาน - Studio Admin</title>

  <!-- Fonts + Bootstrap -->
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="/styles.css" rel="stylesheet"/>

  <!-- guard -->
  <script>(function(){ if(!sessionStorage.getItem('authToken')) location.replace('/login.html'); })();</script>

  <!-- FullCalendar -->
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.14/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.14/locales-all.global.min.js"></script>

  <style>
    .page-body{ max-width:1180px; margin:0 auto; padding:10px 16px }
    /* FullCalendar base */
    #calendar .fc{
      --fc-border-color:#e9edf2;
      --fc-page-bg-color:transparent;
      --fc-today-bg-color:rgba(37,99,235,.06);
      --fc-neutral-bg-color:transparent;
      width:100%; max-width:100%;
    }
    #calendar .fc-scrollgrid{ border-radius:14px; overflow:hidden; border:1px solid var(--fc-border-color) }
    #calendar .fc-col-header-cell{ background:#fbfcff }
    #calendar .fc-col-header-cell-cushion{ padding:10px 0; font-weight:600; color:#667085 }
    #calendar .fc-daygrid-day-number{ padding:8px 10px; font-weight:600; color:#3a5a98 }
    #calendar .fc-daygrid-day:hover{ background:#fbfcfe }
    #calendar .fc .fc-toolbar-title{ font-weight:700; letter-spacing:.2px }
    #calendar .fc .fc-toolbar .btn{ border-radius:10px }
    #calendar .fc-daygrid-day-frame{ padding:6px }

    #calendar .fc-event{ border:0 !important; border-radius:999px }
    #calendar .fc-daygrid-event{ max-width:100%; overflow:hidden }
    #calendar .fc-daygrid-event .evt-chip{ width:100% }

    .evt-chip{
      display:flex; align-items:center; gap:6px;
      padding:4px 8px; border-radius:999px;
      font-weight:600; font-size:.8rem; line-height:1.2;
      max-width:100%; overflow:hidden; box-shadow:0 1px 0 rgba(0,0,0,.04);
    }
    .evt-title{ flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap }
    .evt-time{ flex-shrink:0; font-size:.75rem; opacity:.8 }
    .evt-dot{ width:6px; height:6px; border-radius:999px; flex-shrink:0 }
    .evt-green{ background:#e9f9ef; color:#106232 } .evt-green .evt-dot{ background:#22c55e }
    .evt-yellow{ background:#fff8d6; color:#7a5b00 } .evt-yellow .evt-dot{ background:#facc15 }
    .evt-red{ background:#ffe8e8; color:#8a1717 } .evt-red .evt-dot{ background:#ef4444 }

    .calendar-legend{ display:flex; gap:14px; align-items:center; margin:-4px 0 14px }
    .calendar-legend .dot{ width:10px; height:10px; border-radius:999px; display:inline-block; margin-right:8px }
    .dot-confirmed{ background:#22c55e } .dot-pending{ background:#facc15 } .dot-cancelled{ background:#ef4444 }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar offcanvas-lg offcanvas-start" tabindex="-1" id="sidebar">
      <div class="offcanvas-body">
        <div class="d-lg-none mb-3"><button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" data-bs-target="#sidebar"></button></div>
        <div class="brand">Studio Admin</div>
        <nav class="nav">
          <a href="/dashboard.html">📊 แดชบอร์ด</a>
          <a href="/index.html">📒 จัดการการจอง</a>
          <a href="/quotes.html">💬 จัดการใบเสนอราคา</a>
          <a href="/invoices.html">🧾 จัดการใบแจ้งหนี้</a>
          <a href="/calendar.html" class="active">📆 ปฏิทินงาน</a>

          <a href="/tasks.html">👷 จ่ายงาน/เบิกของ</a>
          <a href="/inventory.html">📦 คลังอุปกรณ์</a>
          <a href="/employees.html">👥 จัดการพนักงาน</a>
          <a href="/settings.html">⚙️ ตั้งค่า</a>
        </nav>
        <div class="spacer"></div>
        <div class="sidebar-logout">
          <button id="btn-logout" class="btn btn-outline-light w-100">ออกจากระบบ</button>
        </div>
      </div>
    </aside>

    <main class="main">
      <div class="page-card">
        <div class="page-header">
          <div>
            <h4 class="m-0">ปฏิทินงาน</h4>
            <div class="text-muted small">ดูตารางงานทั้งหมดของสตูดิโอ</div>
          </div>
          <button class="btn btn-light d-lg-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebar">เมนู</button>
        </div>
        <div class="page-body">
          <div class="calendar-legend">
            <span><i class="dot dot-confirmed"></i>ยืนยันแล้ว</span>
            <span><i class="dot dot-pending"></i>รอการยืนยัน</span>
            <span><i class="dot dot-cancelled"></i>ยกเลิก</span>
          </div>
          <div id="calendar"></div>
        </div>
      </div>
    </main>
  </div>


  <!-- Modal: รายละเอียดอีเวนต์ -->
  <div class="modal fade" id="event-detail-modal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog"><div class="modal-content">
      <div class="modal-header"><h5 id="event-title" class="modal-title"></h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <div id="event-body"></div>
        <hr>
        <div id="ai-suggestion-container" class="d-none">
          <h6 class="fw-bold"><i class="bi bi-robot"></i> AI Creative Direction</h6>
          <div id="ai-suggestion-content" class="small p-3 bg-light rounded border"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline-secondary" id="btn-ai-shotlist">✨ AI Suggest Shot List</button>
        <button class="btn btn-outline-primary btn-edit-booking" id="btn-edit-from-detail">แก้ไขการจอง</button>
        <button class="btn btn-dark" id="btn-assign-task">👷 จ่ายงาน</button>
        <button class="btn btn-light" data-bs-dismiss="modal">ปิด</button>
      </div>
    </div></div>
  </div>

  <!-- Modal: เพิ่มการจอง -->
  <div class="modal fade" id="addBookingModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <form id="add-booking-form" autocomplete="off">
          <div class="modal-header">
            <h5 class="modal-title">เพิ่มการจองใหม่</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <label class="form-label">ชื่อลูกค้า</label>
              <input name="customer" class="form-control" required />
            </div>
            <div class="row">
              <div class="col-md-4 mb-3">
                <label class="form-label">วันที่</label>
                <input type="date" name="date" class="form-control" required id="add-date">
              </div>
              <div class="col-md-4 mb-3">
                <label class="form-label">เวลาเริ่ม</label>
                <input type="time" name="startTime" class="form-control" required value="10:00">
              </div>
              <div class="col-md-4 mb-3">
                <label class="form-label">เวลาสิ้นสุด</label>
                <input type="time" name="endTime" class="form-control" required value="12:00">
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">ประเภทงาน</label>
              <select name="bookingType" class="form-select">
                <option value="ถ่ายภาพนิ่ง">ถ่ายภาพนิ่ง</option>
                <option value="ถ่ายวิดีโอ">ถ่ายวิดีโอ</option>
                <option value="Live Stream">Live Stream</option>
                <option value="เช่าสถานที่">เช่าสถานที่</option>
                <option value="อื่นๆ">อื่นๆ</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label">เบอร์โทร</label>
              <input name="contactPhone" class="form-control">
            </div>
            <div class="mb-3">
              <label class="form-label">รายละเอียด</label>
              <textarea name="details" class="form-control" rows="3"></textarea>
            </div>
          </div>
          <div class="modal-footer">
            <button class="btn btn-light" data-bs-dismiss="modal" type="button">ยกเลิก</button>
            <button class="btn btn-primary" type="submit">บันทึก</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Modal: แก้ไขการจอง -->
  <div class="modal fade" id="editBookingModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <form id="edit-booking-form">
          <div class="modal-header">
            <h5 class="modal-title">แก้ไขการจอง</h5>
            <button class="btn-close" data-bs-dismiss="modal" type="button"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="edit-id">
            <div class="mb-3">
              <label class="form-label">ชื่อลูกค้า</label>
              <input id="edit-customer" name="customer" class="form-control" required />
            </div>
            <div class="row">
              <div class="col-md-4 mb-3">
                <label class="form-label">วันที่</label>
                <input type="date" id="edit-date" name="date" class="form-control" required>
              </div>
              <div class="col-md-4 mb-3">
                <label class="form-label">เวลาเริ่ม</label>
                <input type="time" id="edit-startTime" name="startTime" class="form-control" required>
              </div>
              <div class="col-md-4 mb-3">
                <label class="form-label">เวลาสิ้นสุด</label>
                <input type="time" id="edit-endTime" name="endTime" class="form-control" required>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">สถานะ</label>
              <select id="edit-status" name="status" class="form-select">
                <option value="Pending">รอการยืนยัน</option>
                <option value="Confirmed">ยืนยันแล้ว</option>
                <option value="Cancelled">ยกเลิก</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label">รายละเอียด</label>
              <textarea id="edit-details" name="details" class="form-control" rows="3"></textarea>
            </div>
          </div>
          <div class="modal-footer">
            <button class="btn btn-light" data-bs-dismiss="modal" type="button">ยกเลิก</button>
            <button class="btn btn-success" type="submit">บันทึก</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="position-fixed bottom-0 end-0 p-3" style="z-index:1080">
    <div id="app-toast" class="toast align-items-center text-bg-success border-0" role="alert">
      <div class="d-flex">
        <div class="toast-body" id="toast-msg">บันทึกสำเร็จ</div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('btn-logout')?.addEventListener('click',()=>{
      sessionStorage.clear();
      //;
      location.replace('/login.html');
    });

    // Role-based access control
    if(sessionStorage.getItem('userRole') !== 'Admin') {
      document.querySelectorAll('a[href="/employees.html"], a[href="/settings.html"]').forEach(el => el.style.display = 'none');
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/bookings.js"></script>
</body>
</html>
