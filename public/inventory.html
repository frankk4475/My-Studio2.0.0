<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>คลังอุปกรณ์ - My-Studio 2.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="/styles.css" rel="stylesheet"/>
  <!-- guard -->
  <script>(function(){ if(!sessionStorage.getItem('authToken')) location.replace('/login.html'); })();</script>
  <!-- Barcode Library -->
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
</head>
<body>
<div class="app-container">
  <!-- Dynamic Sidebar -->
  <div id="sidebar-container"></div>

  <!-- Main Wrapper -->
  <div class="main-wrapper">
    <!-- Dynamic Topbar -->
    <div id="topbar-container"></div>

    <main class="content-area">
      <div class="page-card">
        <div class="page-header">
          <div>
            <h4 class="m-0">📦 คลังอุปกรณ์</h4>
            <div class="text-muted small">จัดการอุปกรณ์ทั้งหมดในสตูดิโอ</div>
          </div>
          <div class="d-flex gap-2">
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addEquipModal">+ เพิ่มอุปกรณ์</button>
          </div>
        </div>

        <div class="page-body">
          <div class="table-responsive">
            <table class="table table-hover align-middle">
              <thead>
                <tr>
                  <th>ชื่ออุปกรณ์</th>
                  <th>หมวดหมู่</th>
                  <th>Serial Number</th>
                  <th>Barcode</th>
                  <th>สถานะ</th>
                  <th class="text-end">จัดการ</th>
                </tr>
              </thead>
              <tbody id="equip-table-body">
                <tr><td colspan="6" class="text-center text-muted py-5">กำลังโหลด...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Modal: Add Equipment -->
<div class="modal fade" id="addEquipModal" tabindex="-1">
  <div class="modal-dialog">
    <form id="add-equip-form" class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">เพิ่มอุปกรณ์ใหม่</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">ชื่ออุปกรณ์</label>
          <input name="name" class="form-control" required />
        </div>
        <div class="mb-3">
          <label class="form-label">หมวดหมู่</label>
          <select name="category" class="form-select">
            <option value="Camera">กล้อง</option>
            <option value="Lens">เลนส์</option>
            <option value="Lighting">ไฟ/แสงสว่าง</option>
            <option value="Audio">เสียง</option>
            <option value="Accessory">อุปกรณ์เสริม</option>
            <option value="General">อื่นๆ</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">Serial Number</label>
          <input name="serialNumber" class="form-control" />
        </div>
        <div class="mb-3">
          <label class="form-label">Barcode (ถ้ามี)</label>
          <input name="barcode" class="form-control" placeholder="ทิ้งว่างเพื่อใช้ SN หรือเว้นไว้" />
        </div>
        <div class="mb-3">
          <label class="form-label">หมายเหตุ</label>
          <textarea name="note" class="form-control" rows="2"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-light" data-bs-dismiss="modal">ยกเลิก</button>
        <button type="submit" class="btn btn-primary">บันทึก</button>
      </div>
    </form>
  </div>
</div>

<!-- Modal: Edit Equipment -->
<div class="modal fade" id="editEquipModal" tabindex="-1">
  <div class="modal-dialog">
    <form id="edit-equip-form" class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">แก้ไขข้อมูลอุปกรณ์</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" name="id" id="edit-equip-id">
        <div class="mb-3">
          <label class="form-label">ชื่ออุปกรณ์</label>
          <input name="name" id="edit-equip-name" class="form-control" required />
        </div>
        <div class="mb-3">
          <label class="form-label">หมวดหมู่</label>
          <select name="category" id="edit-equip-category" class="form-select">
            <option value="Camera">กล้อง</option>
            <option value="Lens">เลนส์</option>
            <option value="Lighting">ไฟ/แสงสว่าง</option>
            <option value="Audio">เสียง</option>
            <option value="Accessory">อุปกรณ์เสริม</option>
            <option value="General">อื่นๆ</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">Serial Number</label>
          <input name="serialNumber" id="edit-equip-serialNumber" class="form-control" />
        </div>
        <div class="mb-3">
          <label class="form-label">Barcode</label>
          <input name="barcode" id="edit-equip-barcode" class="form-control" />
        </div>
        <div class="mb-3">
          <label class="form-label">สถานะ</label>
          <select name="status" id="edit-equip-status" class="form-select">
            <option value="Available">พร้อมใช้งาน</option>
            <option value="In Use">กำลังใช้งาน</option>
            <option value="Maintenance">ส่งซ่อม</option>
            <option value="Lost">สูญหาย</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">หมายเหตุ</label>
          <textarea name="note" id="edit-equip-note" class="form-control" rows="2"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-light" data-bs-dismiss="modal">ยกเลิก</button>
        <button type="submit" class="btn btn-primary">บันทึกการแก้ไข</button>
      </div>
    </form>
  </div>
</div>

<!-- Modal: Print Barcode -->
<div class="modal fade" id="barcodeModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">พิมพ์บาร์โค้ด</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body text-center" id="barcode-print-area">
        <h6 id="barcode-item-name" class="mb-2"></h6>
        <svg id="barcode-svg"></svg>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-light" data-bs-dismiss="modal">ปิด</button>
        <button type="button" class="btn btn-primary" onclick="window.printBarcode()">พิมพ์</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/layout.js"></script>
<script src="/inventory.js" defer></script>
</body>
</html>
