<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ใบเสนอราคา - My-Studio 2.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/styles.css" rel="stylesheet">
  <script>(function(){ if(!sessionStorage.getItem('authToken')) location.replace('/login.html'); })();</script>
</head>
<body>
<div class="app-container">
  <div id="sidebar-container"></div>

  <div class="main-wrapper">
    <div id="topbar-container"></div>

    <main class="content-area">
      <div class="card">
        <div class="card-header">
          <h3 class="h6 m-0 fw-bold">จัดการใบเสนอราคา</h3>
          <div class="d-flex gap-2">
            <input type="text" id="quote-search" class="form-control" style="width: 250px;" placeholder="ค้นหาเลขที่หรือชื่อลูกค้า...">
            <button class="btn btn-outline-secondary" id="refresh-btn">🔄 รีเฟรช</button>
            <button class="btn btn-primary" id="btn-create-quote" data-bs-toggle="modal" data-bs-target="#createQuoteModal">+ สร้างใบเสนอราคา</button>
          </div>
        </div>
        <div class="card-body p-0">
          <div class="table-container">
            <table class="table" id="quote-table">
              <thead>
                <tr>
                  <th>เลขที่</th>
                  <th>ลูกค้า</th>
                  <th class="text-end">ยอดรวม</th>
                  <th>วันที่</th>
                  <th>สถานะ</th>
                  <th style="text-align: right;">จัดการ</th>
                </tr>
              </thead>
              <tbody id="quote-table-body">
                <tr><td colspan="6" class="text-center p-4 text-muted">กำลังโหลดข้อมูล...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Modal: Create Quote -->
<div class="modal fade" id="createQuoteModal" tabindex="-1">
  <div class="modal-dialog modal-xl">
    <div class="modal-content">
      <form id="create-quote-form">
        <div class="modal-header">
          <h5 class="modal-title fw-bold">📝 สร้างใบเสนอราคาใหม่</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="cq-bookingId">
          <div class="row g-3 mb-4">
            <div class="col-md-6">
              <label class="form-label">ชื่อลูกค้า/บริษัท <span class="text-danger">*</span></label>
              <input type="text" id="cq-customerName" class="form-control" required placeholder="ระบุชื่อลูกค้า">
            </div>
            <div class="col-md-6">
              <label class="form-label">ชื่อโครงการ / งาน</label>
              <input type="text" id="cq-projectName" class="form-control" placeholder="ระบุชื่อโปรเจกต์">
            </div>
            <div class="col-md-4">
              <label class="form-label">เลขผู้เสียภาษี</label>
              <input type="text" id="cq-customerTaxId" class="form-control">
            </div>
            <div class="col-md-4">
              <label class="form-label">เลขอ้างอิง (Ref)</label>
              <input type="text" id="cq-reference" class="form-control">
            </div>
            <div class="col-md-4">
              <label class="form-label">Credit (วัน)</label>
              <input type="number" id="cq-creditTerm" class="form-control" value="30">
            </div>
            <div class="col-12">
              <label class="form-label">ที่อยู่ลูกค้า</label>
              <textarea id="cq-customerAddress" class="form-control" rows="2"></textarea>
            </div>
          </div>

          <div class="table-responsive">
            <table class="table table-bordered align-middle">
              <thead class="table-light">
                <tr>
                  <th>รายการสินค้า/บริการ</th>
                  <th style="width: 100px;">จำนวน</th>
                  <th style="width: 150px;">ราคาต่อหน่วย</th>
                  <th style="width: 50px;"></th>
                </tr>
              </thead>
              <tbody id="cq-items">
                <!-- Items added via JS -->
              </tbody>
            </table>
          </div>
          <button type="button" class="btn btn-sm btn-outline-primary" id="cq-add-item">+ เพิ่มรายการ</button>

          <div class="row justify-content-end mt-4">
            <div class="col-md-4">
              <div class="d-flex justify-content-between mb-2">
                <span>ยอดรวมรวมสุทธิ:</span>
                <span id="cq-total" class="fw-bold fs-5 text-primary">0.00</span>
              </div>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" data-bs-dismiss="modal">ยกเลิก</button>
          <button type="submit" class="btn btn-primary px-4">💾 บันทึกและสร้างใบเสนอราคา</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Modal: Edit Quote -->
<div class="modal fade" id="edit-quote-modal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-xl">
    <div class="modal-content">
      <form id="edit-quote-form">
        <div class="modal-header">
          <h5 class="modal-title">แก้ไขใบเสนอราคา</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="edit-quote-id">
          <div class="row g-3 mb-4">
            <div class="col-md-6">
              <label class="form-label">ชื่อลูกค้า/บริษัท <span class="text-danger">*</span></label>
              <input type="text" id="edit-quote-customerName" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">ชื่อผู้ติดต่อ</label>
              <input type="text" id="edit-quote-contactName" class="form-control">
            </div>
            <div class="col-md-6">
              <label class="form-label">เลขผู้เสียภาษี</label>
              <input type="text" id="edit-quote-customerTaxId" class="form-control">
            </div>
            <div class="col-md-6">
              <label class="form-label">ชื่อโครงการ / งาน</label>
              <input type="text" id="edit-quote-projectName" class="form-control">
            </div>
            <div class="col-md-8">
              <label class="form-label">ที่อยู่ลูกค้า</label>
              <input type="text" id="edit-quote-customerAddress" class="form-control">
            </div>
            <div class="col-md-2">
              <label class="form-label">เลขอ้างอิง</label>
              <input type="text" id="edit-quote-referenceNumber" class="form-control">
            </div>
            <div class="col-md-2">
              <label class="form-label">Credit (วัน)</label>
              <input type="number" id="edit-quote-creditTerm" class="form-control" value="30">
            </div>
          </div>

          <div class="table-responsive">
            <table class="table table-bordered">
              <thead class="table-light">
                <tr>
                  <th>รายการสินค้า/บริการ</th>
                  <th style="width: 100px;">จำนวน</th>
                  <th style="width: 150px;">ราคาต่อหน่วย</th>
                  <th style="width: 50px;"></th>
                </tr>
              </thead>
              <tbody id="edit-quote-items-container">
                <!-- Items added via JS -->
              </tbody>
            </table>
          </div>
          <button type="button" class="btn btn-sm btn-outline-primary" id="add-edit-item-btn">+ เพิ่มรายการ</button>

          <div class="row justify-content-end mt-4">
            <div class="col-md-4">
              <div class="d-flex justify-content-between mb-2">
                <span>ยอดรวม (Subtotal):</span>
                <span id="edit-quote-subtotal-val">0.00</span>
              </div>
              <div class="d-flex justify-content-between mb-2 align-items-center">
                <span>ส่วนลด (Discount):</span>
                <input type="number" id="edit-quote-discount" class="form-control form-control-sm text-end" style="width: 120px;" value="0">
              </div>
              <div class="d-flex justify-content-between fw-bold border-top pt-2">
                <span>ยอดสุทธิ (Grand Total):</span>
                <span id="edit-quote-grand-val" class="text-primary">0.00</span>
                <span id="edit-quote-discount-val" style="display:none">0</span>
              </div>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ยกเลิก</button>
          <button type="submit" class="btn btn-primary">บันทึกการแก้ไข</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/layout.js"></script>
<script src="/quotes.js"></script>
</body>
</html>
