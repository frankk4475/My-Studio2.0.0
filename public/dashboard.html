<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>แดชบอร์ด - My-Studio 2.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/styles.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>(function(){ if(!sessionStorage.getItem('authToken')) location.replace('/login.html'); })();</script>
</head>
<body>
<div class="app-container">
  <!-- Dynamic Sidebar -->
  <div id="sidebar-container"></div>

  <!-- Main Wrapper -->
  <div class="main-wrapper">
    <!-- Dynamic Topbar -->
    <div id="topbar-container"></div>

    <main class="content-area">
      <!-- Stats Row -->
      <div class="row mb-4" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px;">
        <div class="stat-card">
          <div class="stat-icon" style="background: var(--primary-light); color: var(--primary);">📅</div>
          <div class="stat-info">
            <h4>การจองทั้งหมด</h4>
            <div class="value" id="stat-bookings">0</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background: #dcfce7; color: #10b981;">💰</div>
          <div class="stat-info">
            <h4>รายได้เดือนนี้</h4>
            <div class="value" id="stat-revenue">0.-</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background: #e0f2fe; color: #0ea5e9;">💬</div>
          <div class="stat-info">
            <h4>เชื่อมต่อ LINE</h4>
            <div class="value" id="stat-line">0</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background: #fef3c7; color: #f59e0b;">⏳</div>
          <div class="stat-info">
            <h4>รอยืนยัน</h4>
            <div class="value" id="stat-pending">0</div>
          </div>
        </div>
      </div>

      <!-- Charts & Recent Activity -->
      <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 24px;">
        <!-- Revenue Chart -->
        <div class="card">
          <div class="card-header">
            <h3 class="h6 m-0 fw-bold">สถิติรายได้ 6 เดือนล่าสุด</h3>
          </div>
          <div class="card-body">
            <canvas id="revenueChart" height="280"></canvas>
          </div>
        </div>

        <!-- Recent Activity -->
        <div class="card">
          <div class="card-header">
            <h3 class="h6 m-0 fw-bold">การจองล่าสุด</h3>
          </div>
          <div class="card-body" id="recent-bookings-list">
            <div class="text-center text-muted p-4">กำลังโหลดข้อมูล...</div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/layout.js"></script>
<script src="/dashboard.js"></script>
</body>
</html>
