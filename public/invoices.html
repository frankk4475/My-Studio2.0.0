<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ใบแจ้งหนี้ - My-Studio 2.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/styles.css" rel="stylesheet">
  <script>(function(){ if(!sessionStorage.getItem('authToken')) location.replace('/login.html'); })();</script>
</head>
<body>
<div class="app-container">
  <div id="sidebar-container"></div>

  <div class="main-wrapper">
    <div id="topbar-container"></div>

    <main class="content-area">
      <div class="card">
        <div class="card-header">
          <h3 class="h6 m-0 fw-bold">จัดการใบแจ้งหนี้</h3>
          <div class="d-flex gap-2">
            <input type="text" id="invoice-search" class="form-control" style="width: 250px;" placeholder="ค้นหาเลขที่หรือชื่อลูกค้า...">
            <button class="btn btn-outline-secondary" id="refresh-btn">🔄 รีเฟรช</button>
          </div>
        </div>
        <div class="card-body p-0">
          <div class="table-container">
            <table class="table" id="invoice-table">
              <thead>
                <tr>
                  <th>เลขที่บิล</th>
                  <th>ลูกค้า</th>
                  <th class="text-end">ยอดรวม</th>
                  <th>วันที่</th>
                  <th>สถานะ</th>
                  <th style="text-align: right;">จัดการ</th>
                </tr>
              </thead>
              <tbody id="invoice-table-body">
                <tr><td colspan="6" class="text-center p-4 text-muted">กำลังโหลดข้อมูล...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/layout.js"></script>
<script src="/invoices.js"></script>
</body>
</html>
