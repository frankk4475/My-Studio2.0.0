<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ลงทะเบียนลูกค้า - My-Studio 2.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/styles.css" rel="stylesheet">
  <style>
    body { background-color: var(--bg-main); padding-top: 20px; padding-bottom: 40px; }
    .reg-container { max-width: 500px; margin: auto; padding: 0 20px; }
    .reg-card { border-radius: 20px; border: none; box-shadow: var(--shadow-lg); overflow: hidden; }
    .reg-header { background: var(--primary); color: white; padding: 30px 20px; text-align: center; }
    .reg-body { padding: 30px 25px; background: white; }
    .form-label { font-weight: 600; font-size: 14px; color: var(--text-main); }
    .form-control { border-radius: 12px; padding: 12px 15px; border-color: #e2e8f0; }
    .btn-submit { border-radius: 12px; padding: 14px; font-weight: 700; font-size: 16px; margin-top: 20px; }
    .success-screen { text-align: center; padding: 40px 20px; }
    .success-icon { font-size: 64px; color: var(--success); margin-bottom: 20px; }
  </style>
</head>
<body>

<div class="reg-container">
  <div class="reg-card card">
    <div id="form-view">
      <div class="reg-header">
        <div style="width: 50px; height: 50px; background: rgba(255,255,255,0.2); border-radius: 12px; display: inline-flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; margin-bottom: 15px;">M</div>
        <h3 class="h5 fw-bold m-0">ลงทะเบียนข้อมูลลูกค้า</h3>
        <p class="small m-0 mt-1 opacity-75">กรุณากรอกข้อมูลเพื่อความสะดวกในการจองคิว</p>
      </div>
      
      <div class="reg-body">
        <form id="registration-form">
          <input type="hidden" id="lineUserId">
          
          <div class="form-group mb-3">
            <label class="form-label">ชื่อ-นามสกุล <span class="text-danger">*</span></label>
            <input type="text" id="name" class="form-control" required placeholder="ระบุชื่อจริง">
          </div>
          
          <div class="form-group mb-3">
            <label class="form-label">เบอร์โทรศัพท์ <span class="text-danger">*</span></label>
            <input type="tel" id="phone" class="form-control" required placeholder="08x-xxx-xxxx">
          </div>
          
          <div class="form-group mb-3">
            <label class="form-label">อีเมล</label>
            <input type="email" id="email" class="form-control" placeholder="example@mail.com">
          </div>

          <div class="form-group mb-3">
            <label class="form-label">บริษัท / ชื่อร้าน (ถ้ามี)</label>
            <input type="text" id="company" class="form-control">
          </div>

          <div class="form-group mb-3">
            <label class="form-label">เลขผู้เสียภาษี</label>
            <input type="text" id="taxId" class="form-control">
          </div>

          <div class="form-group mb-3">
            <label class="form-label">Social Media (Line ID / FB)</label>
            <input type="text" id="social" class="form-control">
          </div>

          <div class="form-group mb-3">
            <label class="form-label">ที่อยู่จัดส่ง / ที่อยู่บริษัท</label>
            <textarea id="address" class="form-control" rows="3"></textarea>
          </div>

          <button type="submit" id="btn-submit" class="btn btn-primary w-100 btn-submit">
            🚀 บันทึกข้อมูลลงทะเบียน
          </button>
        </form>
      </div>
    </div>

    <div id="success-view" class="d-none">
      <div class="success-screen">
        <div class="success-icon">✅</div>
        <h4 class="fw-bold">ลงทะเบียนสำเร็จ!</h4>
        <p class="text-muted">ขอบคุณที่ให้ความไว้วางใจ<br>ข้อมูลของคุณถูกบันทึกเข้าระบบเรียบร้อยแล้ว</p>
        <hr class="my-4">
        <p class="small text-secondary">คุณสามารถปิดหน้าต่างนี้<br>และทำรายการจองผ่าน LINE ต่อได้ทันทีครับ</p>
      </div>
    </div>
  </div>
  
  <p class="text-center mt-4 text-muted small">Powered by My-Studio 2.0</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/register.js"></script>
</body>
</html>
