<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ตั้งค่าระบบ - My-Studio 2.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/styles.css" rel="stylesheet">
  <script>(function(){ if(!sessionStorage.getItem('authToken')) location.replace('/login.html'); })();</script>
</head>
<body>
<div class="app-container">
  <div id="sidebar-container"></div>

  <div class="main-wrapper">
    <div id="topbar-container"></div>

    <main class="content-area">
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 24px;">
        <!-- Business Info -->
        <div class="card">
          <div class="card-header"><h3 class="h6 m-0 fw-bold">ข้อมูลธุรกิจ</h3></div>
          <div class="card-body">
            <form id="form-business">
              <div class="form-group">
                <label class="form-label">ชื่อสตูดิโอ</label>
                <input type="text" name="name" class="form-control">
              </div>
              <div class="form-group">
                <label class="form-label">เบอร์โทรศัพท์</label>
                <input type="text" name="phone" class="form-control">
              </div>
              <button type="submit" class="btn btn-primary w-100">บันทึกข้อมูล</button>
            </form>
          </div>
        </div>

        <!-- API Keys -->
        <div class="card">
          <div class="card-header"><h3 class="h6 m-0 fw-bold">การเชื่อมต่อ API (LINE & Gemini)</h3></div>
          <div class="card-body">
            <form id="form-keys">
              <div class="form-group">
                <label class="form-label">Gemini API Key</label>
                <input type="password" name="geminiApiKey" class="form-control">
              </div>
              <div class="form-group">
                <label class="form-label">LINE Admin Token</label>
                <input type="password" name="lineAdminAccessToken" class="form-control">
              </div>
              <button type="submit" class="btn btn-primary w-100">อัปเดต API Keys</button>
            </form>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/layout.js"></script>
<script src="/settings.js"></script>
</body>
</html>
