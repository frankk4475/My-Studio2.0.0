<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>จัดการพนักงาน - My-Studio 2.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="/styles.css" rel="stylesheet"/>
  <!-- guard -->
  <script>(function(){ 
    if(!sessionStorage.getItem('authToken')) location.replace('/login.html');
    if(sessionStorage.getItem('userRole') !== 'Admin') location.replace('/index.html');
  })();</script>
</head>
<body>
<div class="app-container">
  <!-- Dynamic Sidebar -->
  <div id="sidebar-container"></div>

  <!-- Main Wrapper -->
  <div class="main-wrapper">
    <!-- Dynamic Topbar -->
    <div id="topbar-container"></div>

    <main class="content-area">
      <div class="page-card">
        <div class="page-header">
          <div>
            <h4 class="m-0">👥 จัดการพนักงาน</h4>
            <div class="text-muted small">เพิ่ม แก้ไขชื่อที่ใช้แสดง ตำแหน่ง และสิทธิ์การเข้าถึง</div>
          </div>
          <div class="d-flex gap-2">
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addEmployeeModal">+ เพิ่มพนักงาน</button>
          </div>
        </div>

        <div class="page-body">
          <div class="table-responsive">
            <table class="table table-hover align-middle">
              <thead>
                <tr>
                  <th>ชื่อที่ใช้แสดง (Display Name)</th>
                  <th>Username</th>
                  <th>ตำแหน่งงาน</th>
                  <th>สิทธิ์การเข้าถึง</th>
                  <th class="text-end">จัดการ</th>
                </tr>
              </thead>
              <tbody id="employee-table-body">
                <tr><td colspan="5" class="text-center py-5 text-muted">กำลังโหลด...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Modal: Add Employee -->
<div class="modal fade" id="addEmployeeModal" tabindex="-1">
  <div class="modal-dialog">
    <form id="add-employee-form" class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">เพิ่มพนักงานใหม่</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">ชื่อที่ใช้แสดง (Display Name)</label>
          <input name="displayName" class="form-control" placeholder="เช่น นายสมชาย รักดี" required />
        </div>
        <div class="mb-3">
          <label class="form-label">ตำแหน่งงาน</label>
          <input name="jobTitle" class="form-control" placeholder="เช่น ช่างภาพ, กราฟิก" required />
        </div>
        <div class="mb-3">
          <label class="form-label">Username (ใช้สำหรับเข้าสู่ระบบ)</label>
          <input name="username" class="form-control" required minlength="3" />
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input name="password" type="password" class="form-control" required minlength="6" />
        </div>
        <div class="mb-3">
          <label class="form-label">สิทธิ์การเข้าถึง</label>
          <select name="role" class="form-select">
            <option value="Employee">พนักงานทั่วไป (ดูงาน/เบิกของ)</option>
            <option value="Admin">ผู้ดูแลระบบ (จัดการทุกอย่าง)</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-light" data-bs-dismiss="modal">ยกเลิก</button>
        <button type="submit" class="btn btn-primary">บันทึก</button>
      </div>
    </form>
  </div>
</div>

<!-- Modal: Edit Employee -->
<div class="modal fade" id="editEmployeeModal" tabindex="-1">
  <div class="modal-dialog">
    <form id="edit-employee-form" class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">แก้ไขข้อมูลพนักงาน</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" name="id" id="edit-emp-id">
        <div class="mb-3">
          <label class="form-label">ชื่อที่ใช้แสดง (Display Name)</label>
          <input name="displayName" id="edit-emp-displayName" class="form-control" required />
        </div>
        <div class="mb-3">
          <label class="form-label">ตำแหน่งงาน</label>
          <input name="jobTitle" id="edit-emp-jobTitle" class="form-control" required />
        </div>
        <div class="mb-3">
          <label class="form-label">สิทธิ์การเข้าถึง</label>
          <select name="role" id="edit-emp-role" class="form-select">
            <option value="Employee">พนักงานทั่วไป (ดูงาน/เบิกของ)</option>
            <option value="Admin">ผู้ดูแลระบบ (จัดการทุกอย่าง)</option>
          </select>
        </div>
        <div class="text-muted small">หมายเหตุ: ไม่สามารถเปลี่ยน Username ได้</div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-light" data-bs-dismiss="modal">ยกเลิก</button>
        <button type="submit" class="btn btn-primary">บันทึกการแก้ไข</button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/layout.js"></script>
<script src="/employees.js" defer></script>
</body>
</html>
