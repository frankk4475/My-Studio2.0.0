<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>จัดการพนักงาน - My-Studio 2.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="/styles.css" rel="stylesheet"/>
  <script>(function(){ 
    if(!sessionStorage.getItem('authToken')) location.replace('/login.html');
    if(sessionStorage.getItem('userRole') !== 'Admin') location.replace('/index.html');
  })();</script>
</head>
<body>
<div class="app-container">
  <div id="sidebar-container"></div>

  <div class="main-wrapper">
    <div id="topbar-container"></div>

    <main class="content-area">
      <!-- Tab Navigation -->
      <ul class="nav nav-pills mb-4" id="employeeTab" role="tablist">
        <li class="nav-item" role="presentation">
          <button class="nav-link active" id="list-tab" data-bs-toggle="pill" data-bs-target="#employee-list-pane" type="button" role="tab">👥 รายชื่อพนักงาน</button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" id="msg-tab" data-bs-toggle="pill" data-bs-target="#employee-msg-pane" type="button" role="tab">💬 ส่งข้อความ LINE พนักงาน</button>
        </li>
      </ul>

      <div class="tab-content" id="employeeTabContent">
        <!-- Tab 1: Employee List -->
        <div class="tab-pane fade show active" id="employee-list-pane" role="tabpanel">
          <div class="page-card">
            <div class="page-header">
              <div>
                <h4 class="m-0 fw-bold">รายชื่อพนักงานทั้งหมด</h4>
                <div class="text-muted small">จัดการบัญชีผู้ใช้และสิทธิ์การเข้าถึง</div>
              </div>
              <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addEmployeeModal">+ เพิ่มพนักงาน</button>
            </div>
            <div class="page-body p-0">
              <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                  <thead class="table-light">
                    <tr>
                      <th>ชื่อที่ใช้แสดง</th>
                      <th>Username</th>
                      <th class="text-center">LINE Status</th>
                      <th>ตำแหน่ง</th>
                      <th>สิทธิ์</th>
                      <th class="text-end">จัดการ</th>
                    </tr>
                  </thead>
                  <tbody id="employee-table-body">
                    <tr><td colspan="6" class="text-center py-5 text-muted">กำลังโหลดข้อมูล...</td></tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>

        <!-- Tab 2: Messaging -->
        <div class="tab-pane fade" id="employee-msg-pane" role="tabpanel">
          <div class="page-card">
            <div class="page-header">
              <div>
                <h4 class="m-0 fw-bold">ส่งข้อความประกาศถึงพนักงาน</h4>
                <div class="text-muted small">ส่งข้อความแจ้งเตือนผ่าน LINE OA ถึงพนักงานที่เชื่อมต่อแล้ว</div>
              </div>
            </div>
            <div class="page-body">
              <div class="row g-4">
                <div class="col-md-4">
                  <label class="form-label fw-bold">1. เลือกพนักงาน</label>
                  <div id="staff-select-container" class="list-group" style="max-height: 400px; overflow-y: auto;">
                    <!-- Staff linked list -->
                    <div class="p-4 text-center text-muted">กำลังโหลดพนักงานที่เชื่อมต่อ...</div>
                  </div>
                </div>
                <div class="col-md-8">
                  <label class="form-label fw-bold">2. พิมพ์ข้อความ</label>
                  <textarea id="staff-msg-text" class="form-control mb-3" rows="8" placeholder="พิมพ์ข้อความที่ต้องการแจ้งเตือน เช่น แจ้งประชุม, มอบหมายงานด่วน..."></textarea>
                  <button id="btn-send-staff-msg" class="btn btn-success w-100 py-3 fw-bold" disabled>🚀 ส่งข้อความประกาศ</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Modals (Existing structure) -->
<div class="modal fade" id="addEmployeeModal" tabindex="-1">
  <div class="modal-dialog">
    <form id="add-employee-form" class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title fw-bold">➕ เพิ่มพนักงานใหม่</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label fw-bold">ชื่อที่ใช้แสดง (Display Name)</label>
          <input name="displayName" class="form-control" required />
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">ตำแหน่งงาน</label>
          <input name="jobTitle" class="form-control" required />
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">Username</label>
          <input name="username" class="form-control" required minlength="3" />
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">Password</label>
          <input name="password" type="password" class="form-control" required minlength="6" />
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">สิทธิ์การเข้าถึง</label>
          <select name="role" class="form-select">
            <option value="Employee">พนักงานทั่วไป (ดูงาน/เบิกของ)</option>
            <option value="Admin">ผู้ดูแลระบบ (จัดการทุกอย่าง)</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline" data-bs-dismiss="modal">ยกเลิก</button>
        <button type="submit" class="btn btn-primary px-4">บันทึกข้อมูล</button>
      </div>
    </form>
  </div>
</div>

<div class="modal fade" id="editEmployeeModal" tabindex="-1">
  <div class="modal-dialog">
    <form id="edit-employee-form" class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title fw-bold">✏️ แก้ไขข้อมูลพนักงาน</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" name="id" id="edit-emp-id">
        <div class="mb-3">
          <label class="form-label fw-bold">ชื่อที่ใช้แสดง</label>
          <input name="displayName" id="edit-emp-displayName" class="form-control" required />
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">ตำแหน่งงาน</label>
          <input name="jobTitle" id="edit-emp-jobTitle" class="form-control" required />
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">สิทธิ์การเข้าถึง</label>
          <select name="role" id="edit-emp-role" class="form-select">
            <option value="Employee">พนักงานทั่วไป</option>
            <option value="Admin">ผู้ดูแลระบบ</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline" data-bs-dismiss="modal">ยกเลิก</button>
        <button type="submit" class="btn btn-primary px-4">บันทึกการแก้ไข</button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/layout.js"></script>
<script src="/employees.js" defer></script>
</body>
</html>
