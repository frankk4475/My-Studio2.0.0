<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบ - My-Studio 2.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/styles.css" rel="stylesheet">
</head>
<body style="display: flex; align-items: center; justify-content: center; background: #0f172a;">
  <div class="card" style="width: 100%; max-width: 400px; padding: 40px; border-radius: 24px;">
    <div style="text-align: center; margin-bottom: 32px;">
      <div style="width: 64px; height: 64px; background: var(--primary); color: #fff; border-radius: 16px; display: inline-flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; margin-bottom: 16px;">M</div>
      <h2 class="h4 fw-bold m-0">เข้าสู่ระบบ</h2>
      <p class="text-muted small">My-Studio 2.0 Management System</p>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label">ชื่อผู้ใช้งาน</label>
        <input type="text" id="username" class="form-control" required placeholder="กรอกชื่อผู้ใช้งาน">
      </div>
      <div class="form-group">
        <label class="form-label">รหัสผ่าน</label>
        <input type="password" id="password" class="form-control" required placeholder="กรอกรหัสผ่าน">
      </div>
      <button type="submit" class="btn btn-primary w-100 py-3" style="font-size: 16px;">
        🚀 เข้าสู่ระบบ
      </button>
    </form>
    <div id="login-msg" class="mt-3 text-center small text-danger"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/login.js"></script>
</body>
</html>
