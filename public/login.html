<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Studio Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- reverse guard -->
  <script>(function(){ if(sessionStorage.getItem('authToken')) location.replace('/index.html'); })();</script>
  <style>
    :root{ --bg:#f8f9fa }
    html,body{ height:100% }
    body{
      display:flex; align-items:center; justify-content:center;
      background-color: var(--bg);
      padding: 24px;
    }
  </style>
</head>
<body>
  <div class="container" style="max-width:960px">
    <div class="row g-4 align-items-center">
      <div class="col-md-6 d-none d-md-block">
        <h1 class="fw-bold mb-3">Studio Admin</h1>
        <p class="text-muted">ระบบบริหารการจอง / ใบเสนอราคา / ใบแจ้งหนี้</p>
        <ul class="text-muted small mb-0">
          <li>บัญชีถูกป้องกันด้วย JSON Web Token (JWT)</li>
          <li>ระบบจะเด้งออกอัตโนมัติเมื่อโทเค็นหมดอายุ</li>
        </ul>
      </div>
      <div class="col-md-6">
        <div class="card border-0 shadow-sm">
          <div class="card-body p-4">
            <h2 class="card-title text-center mb-3">เข้าสู่ระบบ</h2>

            <div id="reason" class="alert alert-warning py-2 px-3 d-none small"></div>

            <form id="login-form" autocomplete="on" novalidate>
              <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" required autofocus>
              </div>
              <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <div class="input-group">
                  <input type="password" class="form-control" id="password" required minlength="6">
                  <button class="btn btn-outline-secondary" type="button" id="toggle-pass">แสดง</button>
                </div>
              </div>
              <button type="submit" id="btn-login" class="btn btn-primary w-100">
                เข้าสู่ระบบ
              </button>
            </form>

            <p id="error-message" class="text-danger text-center mt-3 mb-0"></p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- วาง defer ให้ DOM โหลดครบก่อน -->
  <script src="/login.js" defer></script>
</body>
</html>
