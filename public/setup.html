<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ตั้งค่าระบบครั้งแรก - My-Studio 2.0</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Inter', 'Sarabun', system-ui, sans-serif; }
    .setup-card { max-width: 450px; width: 100%; padding: 2.5rem; border-radius: 1.5rem; box-shadow: 0 1rem 3rem rgba(0,0,0,0.1); background: white; }
    .btn-primary { border-radius: 0.75rem; font-weight: 600; background-color: #4f46e5; border-color: #4f46e5; }
    .btn-primary:hover { background-color: #4338ca; border-color: #4338ca; }
    .form-control { border-radius: 0.75rem; padding: 0.75rem 1rem; }
  </style>
</head>
<body>
  <div class="setup-card">
    <div class="text-center mb-4">
      <div style="width: 64px; height: 64px; background: #4f46e5; color: #fff; border-radius: 16px; display: inline-flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; margin-bottom: 16px;">M</div>
      <h2 class="fw-bold">ตั้งค่าระบบครั้งแรก</h2>
      <p class="text-muted">สร้างบัญชีผู้ดูแลระบบเพื่อเริ่มต้นใช้งาน</p>
    </div>
    
    <form id="setup-form">
      <div class="mb-3">
        <label class="form-label fw-semibold">ชื่อผู้ใช้ (Username)</label>
        <input type="text" id="username" class="form-control" required minlength="3" placeholder="เช่น admin">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">ชื่อที่แสดง (Display Name)</label>
        <input type="text" id="displayName" class="form-control" placeholder="เช่น ผู้จัดการ">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">รหัสผ่าน</label>
        <input type="password" id="password" class="form-control" required minlength="6" placeholder="อย่างน้อย 6 ตัวอักษร">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">ยืนยันรหัสผ่าน</label>
        <input type="password" id="confirmPassword" class="form-control" required minlength="6">
      </div>
      <div id="error-message" class="alert alert-danger d-none"></div>
      <button type="submit" id="btn-setup" class="btn btn-primary w-100 py-3 mt-2">สร้างบัญชีและเข้าสู่ระบบ</button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="setup.js"></script>
</body>
</html>
