<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>จ่ายงาน & อุปกรณ์ - My-Studio 2.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/styles.css" rel="stylesheet">
  <script>(function(){ if(!sessionStorage.getItem('authToken')) location.replace('/login.html'); })();</script>
</head>
<body>
<div class="app-container">
  <div id="sidebar-container"></div>

  <div class="main-wrapper">
    <div id="topbar-container"></div>

    <main class="content-area">
      <div class="card">
        <div class="card-header">
          <div>
            <h3 class="h6 m-0 fw-bold">รายการจ่ายงานและเบิกอุปกรณ์</h3>
            <div class="small text-muted">จัดการการมอบหมายงานและติดตามสถานะอุปกรณ์</div>
          </div>
          <div class="d-flex gap-2">
            <button class="btn btn-outline-info" onclick="openScanner()">🔍 สแกนบาร์โค้ด</button>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#assignModal">+ จ่ายงานใหม่</button>
          </div>
        </div>
        
        <div class="card-body p-0">
          <div id="loading-spinner" class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <div class="mt-2 text-muted">กำลังโหลดข้อมูล...</div>
          </div>
          <div id="error-alert" class="alert alert-danger m-3 d-none">เกิดข้อผิดพลาดในการโหลดข้อมูล</div>
          
          <div class="table-container">
            <table class="table align-middle" id="task-table">
              <thead>
                <tr>
                  <th>เลขที่ใบเบิก</th>
                  <th>งาน / ลูกค้า</th>
                  <th>พนักงาน</th>
                  <th>อุปกรณ์</th>
                  <th>สถานะ</th>
                  <th style="text-align: right;">จัดการ</th>
                </tr>
              </thead>
              <tbody id="assignments-list">
                <!-- Data injected by JS -->
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Modal: Create Assignment -->
<div class="modal fade" id="assignModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <form id="assign-form" class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title fw-bold">👷 จ่ายงานและเบิกอุปกรณ์</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label fw-bold">เลือกรายการจอง <span class="text-danger">*</span></label>
            <select name="bookingId" id="booking-select" class="form-select" required></select>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-bold">พนักงานผู้รับผิดชอบ <span class="text-danger">*</span></label>
            <select name="employeeId" id="employee-select" class="form-select" required></select>
          </div>
          <div class="col-12">
            <label class="form-label fw-bold">รายละเอียดงานเพิ่มเติม</label>
            <textarea name="taskDescription" class="form-control" rows="2" placeholder="เช่น รายละเอียดหน้าที่พิเศษ..."></textarea>
          </div>
          
          <div class="col-12 mt-4">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <label class="form-label fw-bold m-0">เลือกอุปกรณ์ที่ต้องการเบิก</label>
              <div class="input-group input-group-sm" style="width: 250px;">
                <span class="input-group-text">📟</span>
                <input type="text" id="barcode-input" class="form-control" placeholder="พิมพ์/สแกนรหัสอุปกรณ์">
              </div>
            </div>
            <div class="bg-light p-3 rounded border">
              <div id="equip-checkboxes" class="row g-2" style="max-height: 250px; overflow-y: auto;">
                <!-- Equipment list -->
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline" data-bs-dismiss="modal">ยกเลิก</button>
        <button type="submit" id="btn-save-assignment" class="btn btn-primary">💾 บันทึกและสร้างใบเบิก</button>
      </div>
    </form>
  </div>
</div>

<!-- Modal: Scanner -->
<div class="modal fade" id="scannerModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title fw-bold">🔍 สแกนอุปกรณ์</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body text-center">
        <div id="reader" style="width: 100%; border-radius: 12px; overflow: hidden;"></div>
        <p class="mt-3 text-muted">สแกน QR Code หรือ Barcode ของอุปกรณ์เพื่อเลือกรายการ</p>
      </div>
    </div>
  </div>
</div>

<!-- Modal: Edit Status -->
<div class="modal fade" id="editAssignModal" tabindex="-1">
  <div class="modal-dialog">
    <form id="edit-assign-form" class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title fw-bold">✏️ อัปเดตสถานะงาน</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" name="id" id="edit-assign-id">
        <div class="mb-3">
          <label class="form-label fw-bold">สถานะงาน</label>
          <select name="status" id="edit-assign-status" class="form-select">
            <option value="In Progress">กำลังดำเนินการ / ใช้งาน</option>
            <option value="Completed">คืนของเรียบร้อย (Completed)</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">หมายเหตุการคืนของ</label>
          <textarea name="taskDescription" id="edit-assign-desc" class="form-control" rows="3"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline" data-bs-dismiss="modal">ยกเลิก</button>
        <button type="submit" class="btn btn-primary">บันทึกการแก้ไข</button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="/layout.js"></script>
<script src="/tasks.js"></script>
</body>
</html>
