<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>จัดการลูกค้า & LINE - Studio Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/styles.css" rel="stylesheet">
  <script>(function(){ if(!sessionStorage.getItem('authToken')) location.replace('/login.html'); })();</script>
</head>
<body>
<div class="app">
  <aside class="sidebar offcanvas-lg offcanvas-start" tabindex="-1" id="sidebar">
    <div class="offcanvas-body">
      <div class="d-lg-none mb-3"><button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" data-bs-target="#sidebar"></button></div>
      <div class="brand">Studio Admin</div>
      <nav class="nav">
        <a href="/dashboard.html">📊 แดชบอร์ด</a>
        <a href="/index.html">📒 จัดการการจอง</a>
        <a href="/customers.html" class="active">👥 จัดการลูกค้า & LINE</a>
        <a href="/quotes.html">💬 จัดการใบเสนอราคา</a>
        <a href="/invoices.html">🧾 จัดการใบแจ้งหนี้</a>
        <a href="/calendar.html">📆 ปฏิทินงาน</a>
        <a href="/tasks.html">👷 จ่ายงาน/เบิกของ</a>
        <a href="/inventory.html">📦 คลังอุปกรณ์</a>
        <a href="/employees.html">👥 จัดการพนักงาน</a>
        <a href="/settings.html">⚙️ ตั้งค่า</a>
      </nav>
      <div class="spacer"></div>
      <div class="sidebar-logout">
        <button id="btn-logout" class="btn btn-outline-light w-100">ออกจากระบบ</button>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="page-card">
      <div class="page-header">
        <div>
          <h4 class="m-0">จัดการลูกค้า & LINE</h4>
          <div class="text-muted small">ดูรายชื่อลูกค้าและการเชื่อมต่อ LINE</div>
        </div>
        <button class="btn btn-light d-lg-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebar">เมนู</button>
      </div>

      <div class="page-body">
        <div class="table-responsive">
          <table class="table table-hover">
            <thead class="table-light">
              <tr>
                <th>ลูกค้า</th>
                <th>LINE Status</th>
                <th>เบอร์โทร</th>
                <th>ใช้งานล่าสุด</th>
                <th>จัดการ</th>
              </tr>
            </thead>
            <tbody id="customer-table-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Modal: Send LINE Message -->
<div class="modal fade" id="sendMessageModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">ส่งข้อความ LINE</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">ส่งถึง: <strong id="target-customer-name"></strong></label>
          <textarea id="line-message-text" class="form-control" rows="4" placeholder="พิมพ์ข้อความที่นี่..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-light" data-bs-dismiss="modal">ยกเลิก</button>
        <button class="btn btn-primary" id="btn-send-line">ส่งข้อความ</button>
      </div>
    </div>
  </div>
</div>

<script>
  document.getElementById('btn-logout')?.addEventListener('click',()=>{
    sessionStorage.clear();
    location.replace('/login.html');
  });

  // Role-based access control
  if(sessionStorage.getItem('userRole') !== 'Admin') {
    document.querySelectorAll('a[href="/employees.html"], a[href="/settings.html"]').forEach(el => el.style.display = 'none');
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="customers.js"></script>
</body>
</html>
