<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ลูกค้า & LINE - My-Studio 2.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/styles.css" rel="stylesheet">
  <script>(function(){ if(!sessionStorage.getItem('authToken')) location.replace('/login.html'); })();</script>
</head>
<body>
<div class="app-container">
  <div id="sidebar-container"></div>

  <div class="main-wrapper">
    <div id="topbar-container"></div>

    <main class="content-area">
      <div class="card">
        <div class="card-header">
          <h3 class="h6 m-0 fw-bold">จัดการรายชื่อลูกค้า</h3>
          <div class="d-flex gap-2">
            <input type="text" id="search-customer" class="form-control" style="width: 250px;" placeholder="ค้นหาชื่อลูกค้า...">
            <button class="btn btn-primary" onclick="window.openCustomerModal()">+ เพิ่มลูกค้า</button>
          </div>
        </div>
        <div class="card-body p-0">
          <div class="table-container">
            <table class="table" id="customer-table">
              <thead>
                <tr>
                  <th>ลูกค้า</th>
                  <th>สถานะ LINE</th>
                  <th>เบอร์โทร</th>
                  <th>กิจกรรมล่าสุด</th>
                  <th style="text-align: right;">จัดการ</th>
                </tr>
              </thead>
              <tbody id="customer-table-body">
                <tr><td colspan="5" class="text-center p-5 text-muted">กำลังโหลดข้อมูล...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Modal: Customer Form -->
<div class="modal fade" id="customerModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <form id="customer-form">
        <div class="modal-header">
          <h5 class="modal-title fw-bold" id="customerModalTitle">บันทึกข้อมูลลูกค้า</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="customer-id">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">ชื่อ-นามสกุล <span class="text-danger">*</span></label>
              <input type="text" id="cust-name" class="form-control" required placeholder="ชื่อลูกค้า">
            </div>
            <div class="col-md-6">
              <label class="form-label">บริษัท / ชื่อร้าน</label>
              <input type="text" id="cust-company" class="form-control" placeholder="ถ้ามี">
            </div>
            <div class="col-md-6">
              <label class="form-label">เลขผู้เสียภาษี</label>
              <input type="text" id="cust-taxId" class="form-control">
            </div>
            <div class="col-md-6">
              <label class="form-label">เบอร์โทรศัพท์</label>
              <input type="tel" id="cust-phone" class="form-control">
            </div>
            <div class="col-md-6">
              <label class="form-label">อีเมล</label>
              <input type="email" id="cust-email" class="form-control">
            </div>
            <div class="col-md-6">
              <label class="form-label">Social Media</label>
              <input type="text" id="cust-social" class="form-control" placeholder="Line ID / Facebook">
            </div>
            <div class="col-12">
              <label class="form-label">ที่อยู่</label>
              <textarea id="cust-address" class="form-control" rows="2"></textarea>
            </div>
            <div class="col-12">
              <label class="form-label">หมายเหตุ</label>
              <textarea id="cust-notes" class="form-control" rows="2"></textarea>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" data-bs-dismiss="modal">ยกเลิก</button>
          <button type="submit" id="btn-save-customer" class="btn btn-primary px-4">💾 บันทึกข้อมูล</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Modal: Send LINE Message -->
<div class="modal fade" id="sendMessageModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title fw-bold">💬 ส่งข้อความ LINE</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">ส่งถึง: <span id="target-customer-name" class="fw-bold text-primary"></span></label>
          <textarea id="line-message-text" class="form-control" rows="5" placeholder="พิมพ์ข้อความที่ต้องการส่ง..."></textarea>
        </div>
        <div class="alert alert-light border small text-muted">
          ℹ️ ข้อความนี้จะถูกส่งไปยังลูกค้าผ่าน LINE OA อัตโนมัติ
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline" data-bs-dismiss="modal">ยกเลิก</button>
        <button type="button" id="btn-send-line" class="btn btn-success px-4">🚀 ส่งข้อความ</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/layout.js"></script>
<script src="/customers.js"></script>
</body>
</html>
