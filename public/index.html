<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>การจอง - My-Studio 2.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/styles.css" rel="stylesheet">
  <script>(function(){ if(!sessionStorage.getItem('authToken')) location.replace('/login.html'); })();</script>
</head>
<body>
<div class="app-container">
  <div id="sidebar-container"></div>

  <div class="main-wrapper">
    <div id="topbar-container"></div>

    <main class="content-area">
      <div class="card">
        <div class="card-header">
          <h3 class="h6 m-0 fw-bold">รายการจองคิว</h3>
          <div class="d-flex gap-2">
            <select id="status-filter" class="form-control" style="width: 150px;">
              <option value="">ทั้งหมด</option>
              <option value="Pending">รอยืนยัน</option>
              <option value="Confirmed">ยืนยันแล้ว</option>
              <option value="Cancelled">ยกเลิก</option>
            </select>
            <input type="text" id="search-booking" class="form-control" style="width: 250px;" placeholder="ค้นหาชื่อลูกค้า...">
            <button class="btn btn-primary" id="btn-refresh">🔄 รีเฟรช</button>
            <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addBookingModal">+ จองคิวใหม่</button>
          </div>
        </div>
        <div class="card-body p-0">
          <div class="table-container">
            <table class="table" id="booking-table">
              <thead>
                <tr>
                  <th>วันที่</th>
                  <th>เวลา</th>
                  <th>ลูกค้า</th>
                  <th>งาน</th>
                  <th>สถานะ</th>
                  <th style="text-align: right;">จัดการ</th>
                </tr>
              </thead>
              <tbody id="booking-list">
                <tr><td colspan="6" class="text-center p-4 text-muted">กำลังโหลดข้อมูล...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Modals -->
<div id="modal-container">
  <!-- Add Booking Modal -->
  <div class="modal fade" id="addBookingModal" tabindex="-1">
    <div class="modal-dialog">
      <form id="add-booking-form" class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title fw-bold">📒 เพิ่มการจองใหม่</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label">ชื่อลูกค้า</label>
              <input type="text" name="customer" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">วันที่</label>
              <input type="date" name="date" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">ประเภทงาน</label>
              <input type="text" name="bookingType" class="form-control" placeholder="เช่น ถ่ายพรีเวดดิ้ง">
            </div>
            <div class="col-md-6">
              <label class="form-label">เวลาเริ่ม</label>
              <input type="time" name="startTime" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">เวลาสิ้นสุด</label>
              <input type="time" name="endTime" class="form-control" required>
            </div>
            <div class="col-12">
              <label class="form-label">เบอร์โทรติดต่อ</label>
              <input type="text" name="contactPhone" class="form-control">
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" data-bs-dismiss="modal">ยกเลิก</button>
          <button type="submit" class="btn btn-primary">บันทึกการจอง</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Edit Booking Modal -->
  <div class="modal fade" id="editBookingModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title fw-bold">✏️ จัดการการจอง & ผู้ช่วย AI</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-0">
          <ul class="nav nav-tabs px-3 pt-2" id="editModalTabs" role="tablist">
            <li class="nav-item" role="presentation">
              <button class="nav-link active" id="details-tab" data-bs-toggle="tab" data-bs-target="#tab-details" type="button" role="tab">📝 ข้อมูลการจอง</button>
            </li>
            <li class="nav-item" role="presentation">
              <button class="nav-link" id="ai-tab" data-bs-toggle="tab" data-bs-target="#tab-ai" type="button" role="tab">✨ ผู้ช่วย AI (ฟรี)</button>
            </li>
          </ul>
          <div class="tab-content p-4">
            <!-- Tab 1: Details -->
            <div class="tab-pane fade show active" id="tab-details" role="tabpanel">
              <form id="edit-booking-form">
                <input type="hidden" id="edit-id">
                <div class="row g-3">
                  <div class="col-12">
                    <label class="form-label">ชื่อลูกค้า</label>
                    <input type="text" id="edit-customer" class="form-control" required>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">วันที่</label>
                    <input type="date" id="edit-date" class="form-control" required>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">ประเภทงาน</label>
                    <input type="text" id="edit-bookingType" class="form-control">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">เวลาเริ่ม</label>
                    <input type="time" id="edit-startTime" class="form-control" required>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">เวลาสิ้นสุด</label>
                    <input type="time" id="edit-endTime" class="form-control" required>
                  </div>
                  <div class="col-12">
                    <label class="form-label">เบอร์โทรติดต่อ</label>
                    <input type="text" id="edit-contactPhone" class="form-control">
                  </div>
                  <div class="col-12">
                    <label class="form-label">ประเภทลูกค้า</label>
                    <select id="edit-customerType" class="form-control">
                      <option value="บุคคลทั่วไป">บุคคลทั่วไป</option>
                      <option value="บริษัท">บริษัท</option>
                    </select>
                  </div>
                  <div class="col-12">
                    <label class="form-label">รายละเอียดเพิ่มเติม</label>
                    <textarea id="edit-details" class="form-control" rows="3"></textarea>
                  </div>
                  <div class="col-12 text-end mt-4">
                    <button type="submit" class="btn btn-primary px-4">💾 บันทึกการแก้ไข</button>
                  </div>
                </div>
              </form>
            </div>
            
            <!-- Tab 2: AI Assistant -->
            <div class="tab-pane fade" id="tab-ai" role="tabpanel">
              <div class="row g-3">
                <div class="col-md-4">
                  <button class="btn btn-outline-primary w-100 py-3" id="btn-ai-shotlist">
                    📸 วางแผนถ่ายงาน (Shot List)
                  </button>
                </div>
                <div class="col-md-4">
                  <button class="btn btn-outline-success w-100 py-3" id="btn-ai-equipment">
                    📦 แนะนำอุปกรณ์ที่ควรใช้
                  </button>
                </div>
                <div class="col-md-4">
                  <button class="btn btn-outline-info w-100 py-3" id="btn-ai-email">
                    📧 ร่างอีเมล/ข้อความหาลูกค้า
                  </button>
                </div>
              </div>
              
              <div id="ai-result-container" class="mt-4 p-4 border rounded-3 bg-light d-none" style="min-height: 200px;">
                <div class="d-flex justify-content-between align-items-center mb-2">
                  <h6 class="fw-bold m-0" id="ai-result-title">ผลลัพธ์จาก AI</h6>
                  <button class="btn btn-sm btn-link" onclick="navigator.clipboard.writeText(document.getElementById('ai-result-content').innerText); alert('คัดลอกแล้ว')">📋 คัดลอก</button>
                </div>
                <div id="ai-result-content" class="small" style="white-space: pre-wrap;"></div>
              </div>

              <div id="ai-loading" class="text-center py-5 d-none">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2 small text-muted">AI (Ollama) กำลังคิดคำตอบให้คุณ... (อาจใช้เวลา 5-10 วินาที)</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/layout.js"></script>
<script src="/app.js"></script>
</body>
</html>
